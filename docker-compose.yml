services:
  db:
    image: postgres:15-alpine
    container_name: agriedge_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=agriedge_db
      - POSTGRES_USER=agriedge_user
      - POSTGRES_PASSWORD=agriedge_secure_pass
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: agriedge_redis
    restart: always
    expose:
      - "6379"

  backend:
    build: .
    container_name: agriedge_backend
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "80:8000"
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: agriedge_celery
    restart: always
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env.prod
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  static_volume:
  media_volume:
